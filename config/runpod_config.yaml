# ============================================================
# OmniCortex RunPod Deployment Configuration
# ============================================================
# This file documents recommended runtime topology only.
# Keep secrets in environment variables, not in this file.

runpod:
  template: "pytorch"
  gpu_type: "RTX PRO 6000"
  gpu_count: 1
  region: "auto"
  cloud_type: "SECURE"  # SECURE or COMMUNITY

storage:
  container_disk_gb: 50
  volume_disk_gb: 120

gpu:
  type: "RTX PRO 6000"
  vram_gb: 96
  count: 1

# ------------------------------------------------------------
# Inference backends
# ------------------------------------------------------------
vllm:
  primary:
    enabled: true
    model: "meta-llama/Llama-3.1-8B-Instruct"
    port: 8080
    tensor_parallel_size: 1
    gpu_memory_utilization: 0.25
    max_model_len: 4096
  secondary:
    enabled: false
    model: "meta-llama/Llama-4-Maverick-17B-128E-Instruct"
    port: 8081
    tensor_parallel_size: 1
    gpu_memory_utilization: 0.20
    max_model_len: 8192

# ------------------------------------------------------------
# Voice stack
# ------------------------------------------------------------
moshi:
  enabled: true
  model: "nvidia/personaplex-7b-v1"
  port: 8998
  ui_patch_enabled: true
  omnicortex_base_url: "http://127.0.0.1:8000"

voice_gateway:
  enabled: true
  host: "0.0.0.0"
  port: 8099
  endpoint: "/calls"
  upstream_ws: "ws://127.0.0.1:8000/voice/ws"
  inbound_mode: "pcm16"
  outbound_mode: "pcm16"
  fs_sample_rate: 8000
  moshi_sample_rate: 24000
  tls_terminated_by_nginx: true

# ------------------------------------------------------------
# OmniCortex app
# ------------------------------------------------------------
app:
  api_port: 8000
  base_dir: "/workspace/OmniCortex"

database:
  host: "localhost"
  port: 5432
  name: "omnicortex"
  user: "postgres"

clickhouse:
  enabled: false
  host: "localhost"
  port: 8123
  db: "omnicortex"

ports:
  - 8000  # FastAPI
  - 8080  # vLLM primary
  - 8081  # vLLM secondary (optional)
  - 8998  # Moshi
  - 8099  # Voice Gateway
  - 5432  # PostgreSQL

# Cost estimation (example values, update per region/provider)
cost:
  rtx_pro_6000:
    hourly_rate_usd: 1.84
    vram_gb: 96
    ram_gb: 188
    vcpu: 16
    spot_rate_usd: 1.19
